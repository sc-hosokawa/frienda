name: Contract CI

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - uses: pnpm/action-setup@v2
        with:
          version: 8.10.5
      - name: Use Node.js v18
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm'
      - name: Install Dependencies
        run: cd ${{ inputs.path }} && pnpm install
      - name: Hardhat Test
        run: cd ${{ inputs.path }} && pnpm hardhat test --verbose
      - name: Hardhat Coverage
        run: cd ${{ inputs.path }} && pnpm hardhat coverage
