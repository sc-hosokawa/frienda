name: Next.js CI

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      app:
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - uses: pnpm/action-setup@v2
        with:
          version: 8.10.5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Install Dependencies
        run: cd ${{ inputs.path }} && pnpm install
      - name: Lint
        run: cd ${{ inputs.path }}/${ inputs.app } && pnpm lint
      - name: Build
        run: cd ${{ inputs.path }}/${ inputs.app } && pnpm build
