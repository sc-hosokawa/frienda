name: Go CI

runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21.4'
    - name: Install Dependencies
      run: cd services/backend && go mod download
      shell: bash
