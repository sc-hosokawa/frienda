name: Go CI

on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21.4'
      - name: Install Dependencies
        run: cd services/backend && go mod download
      - name: Test
        run: cd services/backend && go test ./...