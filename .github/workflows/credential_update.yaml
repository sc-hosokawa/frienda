name: Monthly Credential Update

on:
  schedule:
    # 毎月28日の12:00 (UTC) に実行
    - cron: '0 12 15 * *'

jobs:
  update-credentials:
    runs-on: ubuntu-latest
    
    steps:
      - name: Update Credentials
        run: |
          curl -X POST \
            ${{ secrets.API_ENDPOINT }}/pipeline/credentials \
            -d '${{ secrets.DSP_KEY }}'