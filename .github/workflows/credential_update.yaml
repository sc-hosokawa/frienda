name: Monthly Credential Update

on:
  schedule:
    # 毎月28日の12:00 (UTC) に実行
    - cron: '0 12 28 * *'

jobs:
  update-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Update Credentials (Staging)
        run: |
          curl -X POST \
            ${{ secrets.API_ENDPOINT }}/pipeline/credentials \
            -d '${{ secrets.DSP_KEY }}'

  update-production:
    needs: [update-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Update Credentials (Production)
        run: |
          curl -X POST \
            ${{ secrets.PRODUCTION_API_ENDPOINT }}/pipeline/credentials \
            -d '${{ secrets.DSP_KEY }}'