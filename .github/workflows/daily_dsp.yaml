name: Daily DSPs Update

on:
  schedule:
    # 毎日 21:00 UTC (日本時間 翌日 6:00) に実行
    - cron: '0 21 * * *'

jobs:
  update-dsps:
    runs-on: ubuntu-latest
    
    steps:
      - name: Update DSPs
        run: |
          curl -X POST \
            ${{ secrets.API_ENDPOINT }}/pipeline/dsps/daily \
            -d '${{ secrets.DSP_KEY }}'