name: Daily DSPs Update

on:
  schedule:
    # 毎日 15:00 UTC (日本時間 翌日 0:00) に実行
    - cron: '0 15 * * *'

jobs:
  update-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Update DSPs (Staging)
        run: |
          curl -X POST \
            ${{ secrets.API_ENDPOINT }}/pipeline/dsps/daily \
            -d '${{ secrets.DSP_KEY }}'

  update-production:
    needs: [update-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Update DSPs (Production)
        run: |
          curl -X POST \
            ${{ secrets.PRODUCTION_API_ENDPOINT }}/pipeline/dsps/daily \
            -d '${{ secrets.DSP_KEY }}'