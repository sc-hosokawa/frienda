#    steps:
#      - name: Checkout
#        uses: actions/checkout@v4
#      - name: Admin Test
#        uses: ./.github/actions/nextjs-test
#        with:
#          path: 'services/frontend'
#          app: 'admin'
#          node: ${{ matrix.node-version }}


  client:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, 'client')
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Client CI
        uses: ./.github/actions/nextjs-test
        with:
          path: 'services/webui'
          app: 'client'
          node: ${{ matrix.node-version }}

  contract:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, 'contract')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Contract Test
        uses: ./.github/actions/contract-test
        with:
          path: 'services/contract'