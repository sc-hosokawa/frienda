name: fsdao/Test

on:
  push:
    paths:
      - 'services/backend/**'
      - 'services/webui/apps/admin/**'
      - 'services/webui/apps/client/**'
      - 'services/mobile/**'
      - 'services/contract/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'services/backend/**'
      - 'services/webui/apps/client/**'
      - 'services/webui/apps/admin/**'
      - 'services/mobile/**'
      - 'services/contract/**'

jobs:
  backend:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, 'backend')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Rust Test
        uses: ./.github/actions/backend-test
        with:
          path: 'services/backend'


#  admin:
#    runs-on: ubuntu-latest
