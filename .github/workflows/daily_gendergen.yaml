name: Daily GenderGen Update

on:
  schedule:
    # 毎日 22:00 UTC (日本時間 翌日 7:00) に実行
    - cron: '0 22 * * *'

jobs:
  update-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Update GenderGen (Staging)
        run: |
          curl -X POST \
            ${{ secrets.API_ENDPOINT }}/pipeline/dsps/gendergen \
            -d '${{ secrets.DSP_KEY }}'

  update-production:
    needs: [update-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Update GenderGen (Production)
        run: |
          curl -X POST \
            ${{ secrets.PRODUCTION_API_ENDPOINT }}/pipeline/dsps/gendergen \
            -d '${{ secrets.DSP_KEY }}'