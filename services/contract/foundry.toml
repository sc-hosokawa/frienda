[profile.default]
src = 'contracts'
out = 'out'
libs = ['node_modules', 'lib']
test = 'test/foundry'
cache_path  = 'cache_forge'
ffi = true
ast = true
build_info = true
extra_output = ["storageLayout"]
fs_permissions = [{ access = "read", path = "out" }]
optimizer = true
optimizer_runs = 200

[etherscan]
sepolia = { key = "${ETHERSCAN_KEY}" }

[rpc_endpoints]
sepolia = "https://sepolia.infura.io/v3/${INFURA_KEY}"