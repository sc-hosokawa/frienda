[workspace]
members = [
    "server-core",
    "server-extention",
    "shared"
]
resolver = "2"

[workspace.dependencies]
actix-web = "4.9.0"
futures = "0.3.30"
sea-orm = { version = "1.0.1", features = ["sqlx-postgres", "runtime-tokio-rustls", "debug-print"] }
dotenvy = "0.15.7"
tracing-subscriber = "0.3.18"
tracing = "0.1.40"
async-graphql = "7.0.9"
async-graphql-actix-web = "7.0.9"
