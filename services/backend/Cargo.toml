[workspace]
members = [
    "server-core",
    "server-extension",
    "shared"
]
resolver = "2"

[workspace.dependencies]
actix-web = "4.9.0"
actix-cors = "0.7.0"
futures = "0.3.30"
sea-orm = { version = "1.0.1", features = ["sqlx-postgres", "runtime-tokio-rustls", "debug-print"] }
dotenvy = "0.15.7"
tracing-subscriber = { version = "0.3.18", features = ["env-filter", "json"] }
tracing = { version = "0.1.40" }
tracing-actix-web = "0.7.13"
async-graphql = "7.0.11"
async-graphql-actix-web = "7.0.11"
async-trait = "0.1.83"
uuid = { version = "1.10.0", features = ["v4", "serde"] }
thiserror = "1.0.64"
serde = { version = "1.0.210", features = ["derive"] }
serde_json = "1.0.128"
derive-new = "0.7.0"
strum = { version = "0.26.3", features = ["derive"] }
anyhow = "1.0.89"
svix = "1.20.0"
http = "1"

[profile.release]
opt-level = "s"
debug = false
lto = true
codegen-units = 1
strip = true
panic = "abort"
