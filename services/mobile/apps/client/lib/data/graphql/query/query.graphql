query HealthCheck {
  healthCheck {
    status
  }
}

# Login時に取得するユーザー情報
query GetUserInfo {
  getUserInfo {
    userInfo {
      id
      email
      name
      imageUrl
      fspBalance
      fspBalanceTemp
      credentialBalance
      roles
      primaryRole
      belongsToArtists {
        id
        name
        imageUrl
        isAccepted
      }
      primaryArtist {
        id
        name
        imageUrl
        isAccepted
      }
    }
  }
}

query GetAllOffers {
  getAllOffers {
    id
    title
    description
    imageUrl
    fee
    category
  }
}

query GetMessageRooms {
  getMessageRooms {
    messageRoomList {
      id
      countOfMessages
      category
      latestMessage {
        id
        sendBy {
          id
          name
          imageUrl
        }
        message
        createdAt
        attachedFile
        attachedImg
      }
      latestSentAt
      isRead
    }
    countOfMessageRooms
  }
}

query GetMessagesByMessageRoomId($messageRoomId: String!) {
  getMessagesByMessageRoomId(messageRoomId: $messageRoomId) {
    id
    to {
      id
      name
      imageUrl
    }
    messageList {
      id
      sendBy {
        id
        name
        imageUrl
      }
      message
      createdAt
      attachedFile
      attachedImg
    }
  }
}

query GetNotifications($count: Int!, $offset: Int!) {
  getNotifications(count: $count, offset: $offset) {
    notifications {
      id
      title
      content
      createdAt
      updatedAt
    }
  }
}

query GetUserData($userId: String!) {
  getUserData(userId: $userId) {
    id
    email
    name
    imageUrl
    fspBalance
    fspBalanceTemp
    credentialBalance
    roles
    primaryRole
    belongsToArtists {
      id
      name
      imageUrl
      isAccepted
    }
    primaryArtist {
      id
      name
      imageUrl
      isAccepted
    }
  }
}

# 新しいクエリを追加

query GetOverviewData($artistId: String) {
  getOverviewData(artistId: $artistId) {
    totalPlaybacks
    weeklyPlaybacks
  }
}

query GetTrendingData($artistId: String) {
  getTrendingData(artistId: $artistId) {
    trendingTracks {
      isrc
      imgUrl
      title
    }
  }
}

query GetLineChartData($artistId: String, $isrc: String, $dsp: String, $period: String) {
  getLineChartData(artistId: $artistId, isrc: $isrc, dsp: $dsp, period: $period) {
    lineChartData
  }
}

query GetPlaybacksByGenderData($artistId: String, $isrc: String, $dsp: String, $period: String) {
  getPlaybacksByGenderData(artistId: $artistId, isrc: $isrc, dsp: $dsp, period: $period) {
    malePlaybacks
    femalePlaybacks
    unknownPlaybacks
  }
}

query GetPlaybacksByGenerationData($artistId: String, $isrc: String, $dsp: String, $period: String) {
  getPlaybacksByGenerationData(artistId: $artistId, isrc: $isrc, dsp: $dsp, period: $period) {
    playbacksOver60
    playbacks50S
    playbacks40S
    playbacks30S
    playbacks20S
    playbacksUnder10S
  }
}

query GetCommunities {
