query GetFspHistory($userId: String!, $count: Int!) {
  getFspHistory(userId: $userId, count: $count) {
    transactionList {
      id
      from {
        id
        name
        imageUrl
      }
      to {
        id
        name
        imageUrl
      }
      amount
      txAt
    }
  }
}

query GetFspHistoryByUser($userId: String!, $count: Int!) {
  getFspHistoryByUser(userId: $userId, count: $count) {
    transactionList {
      id
      amount
      direction
      counterParty {
        id
        name
        imageUrl
      }
      txAt
    }
  }
}