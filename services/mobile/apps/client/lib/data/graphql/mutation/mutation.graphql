mutation AddNewConnection($input: AddNewConnectionByUserInput!) {
  addNewConnection(input: $input) {
    mapId
  }
}

mutation CreateNewMessageRoom($input: CreateNewMessageRoomInput!) {
  createNewMessageRoom(input: $input) {
    id
  }
}

mutation SendMessage($input: SendMessageInput!) {
  sendMessage(input: $input) {
    id
  }
}

mutation CreateNewOffer($input: CreateNewOfferInput!) {
  createNewOffer(input: $input) {
    id
  }
}

mutation UpdateOffer($input: UpdateOfferInput!) {
  updateOffer(input: $input) {
    id
  }
}

mutation DeleteOffer($input: DeleteOfferInput!) {
  deleteOffer(input: $input) {
    id
  }
}

mutation CreateNewUserData($input: CreateNewUserDataInput!) {
  createNewUserData(input: $input) {
    userId
    name
    imageUrl
  }
}

mutation UpdateUserData($input: UpdateUserDataInput!) {
  updateUserData(input: $input) {
    userInfo {
      id
      email
      name
      imageUrl
      fspBalance
      fspBalanceTemp
      credentialBalance
      roles
      primaryRole
      belongsToArtists {
        id
        name
        imageUrl
        isAccepted
      }
      primaryArtist {
        id
        name
        imageUrl
        isAccepted
      }
    }
  }
}

mutation UpdateBelongsToArtistStatus($input: UpdateBelongsToArtistStatusInput!) {
  updateBelongsToArtistStatus(input: $input) {
    artistList {
      artistList {
        id
        name
        imageUrl
        isAccepted
      }
    }
  }
}

mutation ContactToAdmin($input: ContactToAdminInput!) {
  contactToAdmin(input: $input) {
    id
  }
}

mutation CreateNewNotification($input: CreateNewNotificationInput!) {
  createNewNotification(input: $input) {
    id
  }
}

mutation UpdateNotification($input: UpdateNotificationInput!) {
  updateNotification(input: $input) {
    id
  }
}

mutation DeleteNotification($input: DeleteNotificationInput!) {
  deleteNotification(input: $input) {
    id
  }
}

mutation CreateFspTx($input: CreateNewTransactionInput!) {
  createFspTx(input: $input) {
    newBalance
  }
}

mutation CreateNewArtist($input: CreateNewArtistInput!) {
  createNewArtist(input: $input) {
    id
    name
  }
}
