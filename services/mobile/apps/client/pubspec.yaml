name: client
description: "A FRIENDSHIP. App"
publish_to: 'none'

version: 1.0.1+8

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  utils: 
    path: ../../packages/utils
  smooth_page_indicator: ^1.2.0+3
  flutter_native_splash: ^2.4.1
  cupertino_icons: ^1.0.6
  gql_http_link: ^1.1.0
  built_collection: ^5.1.1
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  freezed_annotation: ^2.4.4
  flutter_secure_storage: ^9.0.0
  json_annotation: ^4.9.0
  fl_chart: ^0.69.0
  qr_code_scanner: ^1.0.1
  qr_flutter: ^4.1.0
  countries_world_map: ^1.3.0
  flutter_graph_view: ^1.1.3+1
  app_settings: ^5.1.1
  flutter_launcher_icons: ^0.14.1
  file_picker: ^8.1.3
  firebase_storage: ^12.3.4
  image_picker: ^1.1.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  webview_flutter: ^4.10.0
  graphql_codegen: ^1.0.1
  graphql_flutter: ^5.2.0-beta.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/friendshipdao_loop.gif
    - assets/logo_visualonly.jpg
    - assets/friendship_logo_white.png
    - assets/logo_visualonly_dark.jpg
  fonts:
    - family: Noto Sans JP
      fonts:
        - asset: assets/fonts/NotoSans/NotoSansJP-VariableFont_wght.ttf
    - family: Jost
      fonts:
        - asset: assets/fonts/Jost/Jost-Regular.ttf

flutter_native_splash:
  color: '#ffffff'
  image: 'assets/logo_visualonly.jpg'
  color_dark: '#010100'
  image_dark: 'assets/logo_visualonly_dark.jpg'
  fullscreen: true
  android_12:
    icon_background_color: '#010100'
    image: 'assets/logo_visualonly.jpg'

flutter_icons:       
  android: true
  ios: true
  image_path: "assets/logo_visualonly.jpg"