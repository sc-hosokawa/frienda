query HealthCheck {
  healthCheck {
    status
  }
}

query GetUserData($userId: String!) {
  getUserData(userId: $userId) {
    id
    name
    email
    realname
    imageUrl
    isSuperAdmin
    fspBalance
    credentialBalance
    evmAddr
    role
    primaryRole
    greeting
    skill
    xHandle
    instagramHandle
    fbHandle
    interestOffer
    createdAt
  }
}

query GetOffers {
  getOffers {
    offerList {
      id
      title
      description
      imageUrl
      fee
      category
      place
    }
  }
}

query GetMessageRooms($userId: String!) {
  getMessageRooms(userId: $userId) {
    messageRoomList {
      id
      category
      latestMessage
      latestMessageId
      latestSentAt
      isRead
    }
    countOfMessageRooms
  }
}

query GetMessagesByMessageRoomId($userId: String!, $messageRoomId: String!) {
  getMessagesByMessageRoomId(userId: $userId, messageRoomId: $messageRoomId) {
    id
    to {
      id
      name
      realname
      imageUrl
    }
    messageList {
      id
      content
      sentBy
      sentAt
      attachedFile
      attachedImg
    }
  }
}

query GetNotifications($userId: String!) {
  getNotifications(userId: $userId) {
    id
    title
    category
    content
    isRead
    createdAt
  }
}
